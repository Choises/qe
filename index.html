<body style="margin:0; padding:0;">

<!-- ΠΡΟΣΘΗΚΗ: Το κουμπί εμφάνισης/απόκρυψης ήχου -->
<button id="volume-control-btn" onclick="toggleSound()">🔇 ΕΝΕΡΓΟΠΟΙΗΣΗ ΗΧΟΥ</button>

<div id="player" ></div> 
<script type="text/javascript">
		function getData(e){e=e.replace(/[\[]/,"[").replace(/[\]]/,"]");
        var a=new RegExp("[?&]"+e+"=([^&#]*)").exec(location.search);return null===a?"":decodeURIComponent(a[1].replace(/\+/g," "))}
		var playerInstance = jwplayer("player");
		playerInstance.setup({
		    title : "TITLE",
	      description: "DESCRIPTION",
			file: "https://rtmp.streams.ovh:1936/barazarelax/barazarelax/playlist.m3u8",
			type: "hls",
			width: "100%",
			height: "100%",
			aspectratio: "16:9",
			autostart: true,
			cast:{},
		});		
		jwplayer("player").on("play", function(e){jwplayer("player").setCurrentAudioTrack(getData("lang"));jwplayer("player").setCurrentQuality(3)});
		
		/* ΠΡΟΣΘΗΚΗ: Λειτουργία ελέγχου ήχου για το κουμπί */
		function toggleSound() {
			const btn = document.getElementById('volume-control-btn');
			if (playerInstance.getMute()) {
				playerInstance.setMute(false);
				btn.innerHTML = "🔊 ΣΙΓΑΣΗ";
			} else {
				playerInstance.setMute(true);
				btn.innerHTML = "🔇 ΗΧΟΣ";
			}
		}
	</script>

</script>
<script>function toggleFullscreen() {
  let elem = document.querySelector("iframe");

  if (!document.fullscreenElement) {
    elem.requestFullscreen().catch((err) => {
      alert(`Error attempting to enable fullscreen mode: ${err.message} (${err.name})`);
    });
  } else {
    document.exitFullscreen();
  }
}</script>

</body>
